# DAG Workflow Template — Example
# Copy this file and rename to create your own template.
# Use with: dagworker template_start { template_id: '<filename-without-extension>', template_input: { goal: '...' } }
#
# Template directories:
#   Global:  ~/.config/opencode/dag_templates/
#   Project: .opencode/dag_templates/
#
# System templates (read-only, code-embedded): see dagworker template_list

name: example-workflow
max_concurrency: 3
timeout_ms: 1800000
nodes:
  - id: analyze
    name: Analyze
    dependencies: []
    required: true
    timeout_ms: 300000
    worker_type: explore
    worker_config:
      agent: explore
      prompt: "Analyze the codebase and report findings."
      model_level: low

  - id: implement
    name: Implement
    dependencies: [analyze]
    required: true
    worker_type: implement
    worker_config:
      agent: implement
      prompt: "Implement the changes based on analysis."
      model_level: medium

  - id: verify
    name: Verify
    dependencies: [implement]
    required: true
    worker_type: verify
    worker_config:
      agent: verify
      prompt: "Run tests and verify changes."
      model_level: medium
